<svg viewBox="0 0 1100 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <linearGradient id="dbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="48%" stop-color="#102c46"/>
      <stop offset="100%" stop-color="#0a2a28"/>
    </linearGradient>
    <pattern id="ddots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <filter id="dshadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="darrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#7fa8c9"/>
    </marker>

    <symbol id="d-globe" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.8 2.4 4.4 5.6 4.4 9s-1.6 6.6-4.4 9c-2.8-2.4-4.4-5.6-4.4-9s1.6-6.6 4.4-9z"/>
    </g></symbol>
    <symbol id="d-check" viewBox="0 0 24 24"><path d="M4 12.5l5.5 5.5L20 6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="d-doc" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3h8l4 4v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M8 12h8M8 16h8M8 8h4"/>
    </g></symbol>
    <symbol id="d-brain" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="9.5" r="4.2"/><circle cx="15" cy="9.5" r="4.2"/><circle cx="12" cy="15" r="4.2"/>
    </g></symbol>
    <symbol id="d-docpen" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3h8l4 4v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M9.5 14.5 16 8l2 2-6.5 6.5H9.5v-2z"/>
    </g></symbol>
  </defs>

  <rect width="1100" height="300" rx="22" fill="url(#dbg)"/>
  <rect width="1100" height="300" rx="22" fill="url(#ddots)"/>

  <text x="550" y="36" text-anchor="middle" font-size="11" letter-spacing="3" font-weight="700" fill="#6fd8c7">ONE OPPORTUNITY, START TO FINISH</text>
  <text x="550" y="68" text-anchor="middle" font-size="24" font-weight="600" fill="#f3f6fa">n8n pipeline: One posting, traced end to end</text>
  <text x="550" y="90" text-anchor="middle" font-size="12" fill="#9fb3c8">From a fresh listing to a drafted cover letter, with no manual step in between</text>

  <line x1="170" y1="180" x2="198" y2="180" stroke="#7fa8c9" stroke-width="1.8" marker-end="url(#darrow)"/>
  <line x1="350" y1="180" x2="378" y2="180" stroke="#7fa8c9" stroke-width="1.8" marker-end="url(#darrow)"/>
  <line x1="530" y1="180" x2="558" y2="180" stroke="#7fa8c9" stroke-width="1.8" marker-end="url(#darrow)"/>
  <line x1="710" y1="180" x2="738" y2="180" stroke="#7fa8c9" stroke-width="1.8" marker-end="url(#darrow)"/>
  <line x1="890" y1="180" x2="918" y2="180" stroke="#7fa8c9" stroke-width="1.8" marker-end="url(#darrow)"/>

  <!-- Stage 1: scan -->
  <g filter="url(#dshadow)">
    <rect x="20" y="110" width="150" height="140" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
  </g>
  <circle cx="95" cy="148" r="18" fill="#5ec8e0" fill-opacity="0.18" stroke="#5ec8e0" stroke-width="1.4"/>
  <use href="#d-globe" x="84" y="137" width="22" height="22" color="#5ec8e0"/>
  <text x="95" y="184" text-anchor="middle" font-size="13" font-weight="600" fill="#f3f6fa">Scan</text>
  <text x="95" y="206" text-anchor="middle" font-size="10" fill="#9fb3c8">Job discovery runs</text>
  <text x="95" y="220" text-anchor="middle" font-size="10" fill="#9fb3c8">on its daily trigger</text>

  <!-- Stage 2: dedupe -->
  <g filter="url(#dshadow)">
    <rect x="200" y="110" width="150" height="140" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
  </g>
  <circle cx="275" cy="148" r="18" fill="#f0a85e" fill-opacity="0.18" stroke="#f0a85e" stroke-width="1.4"/>
  <use href="#d-check" x="264" y="137" width="22" height="22" color="#f0a85e"/>
  <text x="275" y="184" text-anchor="middle" font-size="13" font-weight="600" fill="#f3f6fa">Filter</text>
  <text x="275" y="206" text-anchor="middle" font-size="10" fill="#9fb3c8">Duplicate and stale</text>
  <text x="275" y="220" text-anchor="middle" font-size="10" fill="#9fb3c8">listings are dropped</text>

  <!-- Stage 3: Notion -->
  <g filter="url(#dshadow)">
    <rect x="380" y="110" width="150" height="140" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
  </g>
  <circle cx="455" cy="148" r="18" fill="#f0d25e" fill-opacity="0.18" stroke="#f0d25e" stroke-width="1.4"/>
  <use href="#d-doc" x="444" y="137" width="22" height="22" color="#f0d25e"/>
  <text x="455" y="184" text-anchor="middle" font-size="13" font-weight="600" fill="#f3f6fa">Queue</text>
  <text x="455" y="206" text-anchor="middle" font-size="10" fill="#9fb3c8">New entry written</text>
  <text x="455" y="220" text-anchor="middle" font-size="10" fill="#9fb3c8">to Notion</text>

  <!-- Stage 4: LLM draft -->
  <g filter="url(#dshadow)">
    <rect x="560" y="110" width="150" height="140" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
  </g>
  <circle cx="635" cy="148" r="18" fill="#6fd88a" fill-opacity="0.18" stroke="#6fd88a" stroke-width="1.4"/>
  <use href="#d-brain" x="624" y="137" width="22" height="22" color="#6fd88a"/>
  <text x="635" y="184" text-anchor="middle" font-size="13" font-weight="600" fill="#f3f6fa">Draft</text>
  <text x="635" y="206" text-anchor="middle" font-size="10" fill="#9fb3c8">Next hourly run picks</text>
  <text x="635" y="220" text-anchor="middle" font-size="10" fill="#9fb3c8">it up, drafts a letter</text>

  <!-- Stage 5: ready -->
  <g filter="url(#dshadow)">
    <rect x="740" y="110" width="150" height="140" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
  </g>
  <circle cx="815" cy="148" r="18" fill="#b89bf5" fill-opacity="0.18" stroke="#b89bf5" stroke-width="1.4"/>
  <use href="#d-docpen" x="804" y="137" width="22" height="22" color="#b89bf5"/>
  <text x="815" y="184" text-anchor="middle" font-size="13" font-weight="600" fill="#f3f6fa">Ready</text>
  <text x="815" y="206" text-anchor="middle" font-size="10" fill="#9fb3c8">Letter saved back</text>
  <text x="815" y="220" text-anchor="middle" font-size="10" fill="#9fb3c8">to Notion for review</text>

  <!-- Stage 6: watchdog note off to the side -->
  <g filter="url(#dshadow)">
    <rect x="920" y="130" width="160" height="100" rx="14" fill="#f4886a" fill-opacity="0.08" stroke="#f4886a" stroke-opacity="0.3"/>
  </g>
  <text x="1000" y="158" text-anchor="middle" font-size="11.5" font-weight="600" fill="#f3f6fa">If any step fails</text>
  <text x="1000" y="176" text-anchor="middle" font-size="9.5" fill="#c3d2de">the error handler</text>
  <text x="1000" y="190" text-anchor="middle" font-size="9.5" fill="#c3d2de">catches it and logs</text>
  <text x="1000" y="204" text-anchor="middle" font-size="9.5" fill="#c3d2de">it, nothing is lost</text>

  <text x="550" y="278" text-anchor="middle" font-size="12" fill="#9fb3c8">Everything from the first scan to a drafted letter happens without me opening a laptop.</text>

</svg>
