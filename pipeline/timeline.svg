<svg viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="48%" stop-color="#102c46"/>
      <stop offset="100%" stop-color="#0a2a28"/>
    </linearGradient>
    <pattern id="dots4" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <filter id="cardShadow4" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <symbol id="c-shield" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3 19 6v5.5c0 5-3.2 7.7-7 9-3.8-1.3-7-4-7-9V6z"/><path d="M8.8 12 11 14.2l4.2-4.4"/>
    </g></symbol>
    <symbol id="c-radar" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10.5" cy="10.5" r="6.5"/><circle cx="10.5" cy="10.5" r="3" opacity="0.55"/><path d="M15 15l5.5 5.5"/>
    </g></symbol>
    <symbol id="c-trend" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 17l5.5-5.5L12.5 15 21 6.5"/><path d="M15 6.5h6v6"/>
    </g></symbol>
    <symbol id="c-chain" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="7.5" width="11" height="6.5" rx="3.25"/><rect x="10" y="11" width="11" height="6.5" rx="3.25"/>
    </g></symbol>
    <symbol id="c-mic" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9.3" y="3" width="5.4" height="10.5" rx="2.7"/><path d="M5.3 11a6.7 6.7 0 0 0 13.4 0"/><path d="M12 17.7v3"/><path d="M9 20.7h6"/>
    </g></symbol>
  </defs>

  <rect width="1000" height="320" rx="22" fill="url(#bgGrad4)"/>
  <rect width="1000" height="320" rx="22" fill="url(#dots4)"/>

  <text x="500" y="36" text-anchor="middle" font-size="11" letter-spacing="3" font-weight="700" fill="#6fd8c7">WHILE YOU&#8217;RE NOT LOOKING</text>
  <text x="500" y="68" text-anchor="middle" font-size="24" font-weight="600" fill="#f3f6fa">OpenClaw pipeline: A day in the fleet&#8217;s life</text>
  <text x="500" y="90" text-anchor="middle" font-size="12" fill="#9fb3c8">Representative schedule: agents run continuously, not just when you message them</text>

  <!-- axis -->
  <line x1="70" y1="200" x2="930" y2="200" stroke="#3a5570" stroke-width="2" stroke-linecap="round"/>
  <g font-size="10" fill="#7f93a6" text-anchor="middle">
    <line x1="70" y1="196" x2="70" y2="204" stroke="#3a5570" stroke-width="2"/>
    <text x="70" y="222">Night</text>
    <line x1="242" y1="196" x2="242" y2="204" stroke="#3a5570" stroke-width="2"/>
    <text x="242" y="222">Early morning</text>
    <line x1="414" y1="196" x2="414" y2="204" stroke="#3a5570" stroke-width="2"/>
    <text x="414" y="222">Morning</text>
    <line x1="586" y1="196" x2="586" y2="204" stroke="#3a5570" stroke-width="2"/>
    <text x="586" y="222">Midday</text>
    <line x1="758" y1="196" x2="758" y2="204" stroke="#3a5570" stroke-width="2"/>
    <text x="758" y="222">Afternoon</text>
    <line x1="930" y1="196" x2="930" y2="204" stroke="#3a5570" stroke-width="2"/>
    <text x="930" y="222">Evening</text>
  </g>

  <!-- event: Guardian -->
  <line x1="120" y1="200" x2="120" y2="158" stroke="#6fd88a" stroke-width="1.4" stroke-opacity="0.6"/>
  <circle cx="120" cy="200" r="5.5" fill="#6fd88a"/>
  <g filter="url(#cardShadow4)">
    <rect x="58" y="118" width="124" height="40" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#6fd88a" stroke-opacity="0.4"/>
  </g>
  <use href="#c-shield" x="68" y="129" width="18" height="18" color="#6fd88a"/>
  <text x="92" y="135" font-size="10.5" font-weight="600" fill="#f3f6fa">Guardian</text>
  <text x="92" y="148" font-size="9" fill="#9fb3c8">fleet health check</text>

  <!-- event: Intel -->
  <line x1="270" y1="200" x2="270" y2="138" stroke="#f06fa0" stroke-width="1.4" stroke-opacity="0.6"/>
  <circle cx="270" cy="200" r="5.5" fill="#f06fa0"/>
  <g filter="url(#cardShadow4)">
    <rect x="208" y="98" width="124" height="40" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#f06fa0" stroke-opacity="0.4"/>
  </g>
  <use href="#c-radar" x="218" y="109" width="18" height="18" color="#f06fa0"/>
  <text x="242" y="115" font-size="10.5" font-weight="600" fill="#f3f6fa">Intel</text>
  <text x="242" y="128" font-size="9" fill="#9fb3c8">research digest</text>

  <!-- event: Invest -->
  <line x1="340" y1="200" x2="340" y2="168" stroke="#b89bf5" stroke-width="1.4" stroke-opacity="0.6"/>
  <circle cx="340" cy="200" r="5.5" fill="#b89bf5"/>
  <g filter="url(#cardShadow4)">
    <rect x="278" y="128" width="124" height="40" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#b89bf5" stroke-opacity="0.4"/>
  </g>
  <use href="#c-trend" x="288" y="139" width="18" height="18" color="#b89bf5"/>
  <text x="312" y="145" font-size="10.5" font-weight="600" fill="#f3f6fa">Invest</text>
  <text x="312" y="158" font-size="9" fill="#9fb3c8">market signals</text>

  <!-- event: Pipeline -->
  <line x1="500" y1="200" x2="500" y2="148" stroke="#f0a85e" stroke-width="1.4" stroke-opacity="0.6"/>
  <circle cx="500" cy="200" r="5.5" fill="#f0a85e"/>
  <g filter="url(#cardShadow4)">
    <rect x="438" y="108" width="124" height="40" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#f0a85e" stroke-opacity="0.4"/>
  </g>
  <use href="#c-chain" x="448" y="119" width="18" height="18" color="#f0a85e"/>
  <text x="472" y="125" font-size="10.5" font-weight="600" fill="#f3f6fa">Pipeline</text>
  <text x="472" y="138" font-size="9" fill="#9fb3c8">processes reading</text>

  <!-- event: Podcast -->
  <line x1="790" y1="200" x2="790" y2="158" stroke="#6fa8e0" stroke-width="1.4" stroke-opacity="0.6"/>
  <circle cx="790" cy="200" r="5.5" fill="#6fa8e0"/>
  <g filter="url(#cardShadow4)">
    <rect x="728" y="118" width="124" height="40" rx="10" fill="#ffffff" fill-opacity="0.06" stroke="#6fa8e0" stroke-opacity="0.4"/>
  </g>
  <use href="#c-mic" x="738" y="129" width="18" height="18" color="#6fa8e0"/>
  <text x="762" y="135" font-size="10.5" font-weight="600" fill="#f3f6fa">Podcast</text>
  <text x="762" y="148" font-size="9" fill="#9fb3c8">episode digest</text>

  <!-- pulse on "now" style marker for liveliness -->
  <circle cx="500" cy="200" r="5.5" fill="none" stroke="#f0a85e" stroke-width="1.3">
    <animate attributeName="r" values="5.5;13;5.5" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <text x="500" y="262" text-anchor="middle" font-size="11.5" fill="#9fb3c8">Assistant, Calls, and Coverletter respond on demand rather than on a fixed schedule.</text>

</svg>
