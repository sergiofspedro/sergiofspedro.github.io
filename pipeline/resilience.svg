<svg viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="48%" stop-color="#102c46"/>
      <stop offset="100%" stop-color="#0a2a28"/>
    </linearGradient>
    <pattern id="dots5" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <marker id="arrow5sm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#5e7d96"/>
    </marker>

    <symbol id="d-chat" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 5h13a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H9.5L6 19.5V16H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/>
    </g></symbol>
    <symbol id="d-chain" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="7.5" width="11" height="6.5" rx="3.25"/><rect x="10" y="11" width="11" height="6.5" rx="3.25"/>
    </g></symbol>
    <symbol id="d-trend" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 17l5.5-5.5L12.5 15 21 6.5"/><path d="M15 6.5h6v6"/>
    </g></symbol>
    <symbol id="d-phone" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3h3l2 5-2.5 1.6a11.5 11.5 0 0 0 5.4 5.4L15.4 12.5l5 2v3a2 2 0 0 1-2 2A14.5 14.5 0 0 1 4 5a2 2 0 0 1 2-2z"/>
    </g></symbol>
  </defs>

  <rect width="1000" height="520" rx="22" fill="url(#bgGrad5)"/>
  <rect width="1000" height="520" rx="22" fill="url(#dots5)"/>

  <text x="500" y="40" text-anchor="middle" font-size="11" letter-spacing="3" font-weight="700" fill="#6fd8c7">ENGINEERING FOR RESILIENCE</text>
  <text x="500" y="72" text-anchor="middle" font-size="24" font-weight="600" fill="#f3f6fa">Pipeline — Independent Fallback Chains</text>
  <text x="500" y="94" text-anchor="middle" font-size="12" fill="#9fb3c8">A free tier absorbs the load; a paid model is only the last resort</text>

  <!-- chip macro pattern repeated 4x per row; chip x: 200,370,540,710  w=150 h=46 -->

  <!-- ROW 1 — Assistant -->
  <circle cx="58" cy="163" r="18" fill="#5ec8e0" fill-opacity="0.18" stroke="#5ec8e0" stroke-width="1.4"/>
  <use href="#d-chat" x="47" y="152" width="22" height="22" color="#5ec8e0"/>
  <text x="90" y="168" font-size="13.5" font-weight="600" fill="#f3f6fa">Assistant</text>

  <rect x="200" y="140" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="275" y="167" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier A</text>
  <line x1="350" y1="163" x2="368" y2="163" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="370" y="140" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="445" y="167" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier B</text>
  <line x1="520" y1="163" x2="538" y2="163" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="540" y="140" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="615" y="167" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier C</text>
  <line x1="690" y1="163" x2="708" y2="163" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="710" y="140" width="150" height="46" rx="9" fill="#5ec8e0" fill-opacity="0.12" stroke="#5ec8e0" stroke-width="1.3"/>
  <text x="785" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#f3f6fa">Paid Model</text>
  <text x="785" y="177" text-anchor="middle" font-size="8" letter-spacing="1" fill="#9fe0f0">LAST RESORT</text>

  <!-- ROW 2 — Pipeline -->
  <circle cx="58" cy="253" r="18" fill="#f0a85e" fill-opacity="0.18" stroke="#f0a85e" stroke-width="1.4"/>
  <use href="#d-chain" x="47" y="242" width="22" height="22" color="#f0a85e"/>
  <text x="90" y="258" font-size="13.5" font-weight="600" fill="#f3f6fa">Pipeline</text>

  <rect x="200" y="230" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="275" y="257" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier B</text>
  <line x1="350" y1="253" x2="368" y2="253" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="370" y="230" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="445" y="257" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier C</text>
  <line x1="520" y1="253" x2="538" y2="253" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="540" y="230" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="615" y="257" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier A</text>
  <line x1="690" y1="253" x2="708" y2="253" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="710" y="230" width="150" height="46" rx="9" fill="#f0a85e" fill-opacity="0.12" stroke="#f0a85e" stroke-width="1.3"/>
  <text x="785" y="253" text-anchor="middle" font-size="11" font-weight="600" fill="#f3f6fa">Paid Model</text>
  <text x="785" y="267" text-anchor="middle" font-size="8" letter-spacing="1" fill="#f5cfa0">LAST RESORT</text>

  <!-- ROW 3 — Invest -->
  <circle cx="58" cy="343" r="18" fill="#b89bf5" fill-opacity="0.18" stroke="#b89bf5" stroke-width="1.4"/>
  <use href="#d-trend" x="47" y="332" width="22" height="22" color="#b89bf5"/>
  <text x="90" y="348" font-size="13.5" font-weight="600" fill="#f3f6fa">Invest</text>

  <rect x="200" y="320" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="275" y="347" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier C</text>
  <line x1="350" y1="343" x2="368" y2="343" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="370" y="320" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="445" y="347" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier D</text>
  <line x1="520" y1="343" x2="538" y2="343" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="540" y="320" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="615" y="347" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier A</text>
  <line x1="690" y1="343" x2="708" y2="343" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="710" y="320" width="150" height="46" rx="9" fill="#b89bf5" fill-opacity="0.12" stroke="#b89bf5" stroke-width="1.3"/>
  <text x="785" y="343" text-anchor="middle" font-size="11" font-weight="600" fill="#f3f6fa">Paid Model</text>
  <text x="785" y="357" text-anchor="middle" font-size="8" letter-spacing="1" fill="#d8c8fa">LAST RESORT</text>

  <!-- ROW 4 — Calls -->
  <circle cx="58" cy="433" r="18" fill="#f0d25e" fill-opacity="0.18" stroke="#f0d25e" stroke-width="1.4"/>
  <use href="#d-phone" x="47" y="422" width="22" height="22" color="#f0d25e"/>
  <text x="90" y="438" font-size="13.5" font-weight="600" fill="#f3f6fa">Calls</text>

  <rect x="200" y="410" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="275" y="437" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier A</text>
  <line x1="350" y1="433" x2="368" y2="433" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="370" y="410" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="445" y="437" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier D</text>
  <line x1="520" y1="433" x2="538" y2="433" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="540" y="410" width="150" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14"/>
  <text x="615" y="437" text-anchor="middle" font-size="11" fill="#c3d2de">Free Tier B</text>
  <line x1="690" y1="433" x2="708" y2="433" stroke="#5e7d96" stroke-width="1.4" marker-end="url(#arrow5sm)"/>

  <rect x="710" y="410" width="150" height="46" rx="9" fill="#f0d25e" fill-opacity="0.12" stroke="#f0d25e" stroke-width="1.3"/>
  <text x="785" y="433" text-anchor="middle" font-size="11" font-weight="600" fill="#f3f6fa">Paid Model</text>
  <text x="785" y="447" text-anchor="middle" font-size="8" letter-spacing="1" fill="#f5e8a8">LAST RESORT</text>

  <text x="500" y="494" text-anchor="middle" font-size="12" fill="#9fb3c8">Chains are deliberately diversified — no two agents share the same first two providers,</text>
  <text x="500" y="510" text-anchor="middle" font-size="12" fill="#9fb3c8">so a single rate limit never cascades across the fleet.</text>

</svg>
