<svg viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="48%" stop-color="#102c46"/>
      <stop offset="100%" stop-color="#0a2a28"/>
    </linearGradient>

    <pattern id="dots2" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.05"/>
    </pattern>

    <filter id="cardShadow2" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <symbol id="a-chat" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 5h13a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H9.5L6 19.5V16H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/>
      <path d="M19.2 2.6l.5 1.2 1.2.5-1.2.5-.5 1.2-.5-1.2-1.2-.5 1.2-.5z" fill="currentColor" stroke="none"/>
    </g></symbol>

    <symbol id="a-chain" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="7.5" width="11" height="6.5" rx="3.25"/><rect x="10" y="11" width="11" height="6.5" rx="3.25"/>
    </g></symbol>

    <symbol id="a-shield" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3 19 6v5.5c0 5-3.2 7.7-7 9-3.8-1.3-7-4-7-9V6z"/><path d="M8.8 12 11 14.2l4.2-4.4"/>
    </g></symbol>

    <symbol id="a-trend" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 17l5.5-5.5L12.5 15 21 6.5"/><path d="M15 6.5h6v6"/>
    </g></symbol>

    <symbol id="a-docpen" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3h8l4 4v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M9.5 14.5 16 8l2 2-6.5 6.5H9.5v-2z"/>
    </g></symbol>

    <symbol id="a-radar" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10.5" cy="10.5" r="6.5"/><circle cx="10.5" cy="10.5" r="3" opacity="0.55"/><path d="M15 15l5.5 5.5"/>
    </g></symbol>

    <symbol id="a-phone" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3h3l2 5-2.5 1.6a11.5 11.5 0 0 0 5.4 5.4L15.4 12.5l5 2v3a2 2 0 0 1-2 2A14.5 14.5 0 0 1 4 5a2 2 0 0 1 2-2z"/>
    </g></symbol>

    <symbol id="a-mic" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9.3" y="3" width="5.4" height="10.5" rx="2.7"/><path d="M5.3 11a6.7 6.7 0 0 0 13.4 0"/><path d="M12 17.7v3"/><path d="M9 20.7h6"/>
    </g></symbol>
  </defs>

  <rect width="1000" height="580" rx="22" fill="url(#bgGrad2)"/>
  <rect width="1000" height="580" rx="22" fill="url(#dots2)"/>

  <text x="500" y="42" text-anchor="middle" font-size="11" letter-spacing="3" font-weight="700" fill="#6fd8c7">8 SPECIALIZED AGENTS</text>
  <text x="500" y="76" text-anchor="middle" font-size="26" font-weight="600" fill="#f3f6fa">OpenClaw pipeline: Agent roster</text>
  <text x="500" y="98" text-anchor="middle" font-size="12" fill="#9fb3c8">Each agent runs independently, with its own multi-provider LLM fallback chain</text>

  <!-- Card template repeated x8 — col_x: 29,269,509,749  row_y: 126,338 -->

  <!-- 1 Assistant (cyan) -->
  <g filter="url(#cardShadow2)">
    <rect x="29" y="126" width="222" height="192" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="29" y="126" width="4" height="192" rx="2" fill="#5ec8e0"/>
  </g>
  <circle cx="69" cy="166" r="20" fill="#5ec8e0" fill-opacity="0.18" stroke="#5ec8e0" stroke-width="1.5"/>
  <use href="#a-chat" x="58" y="155" width="22" height="22" color="#5ec8e0"/>
  <text x="101" y="162" font-size="16" font-weight="700" fill="#f3f6fa">Assistant</text>
  <text x="49" y="208" font-size="11.5" fill="#c3d2de">General-purpose personal</text>
  <text x="49" y="224" font-size="11.5" fill="#c3d2de">assistant for day-to-day</text>
  <text x="49" y="240" font-size="11.5" fill="#c3d2de">requests and quick lookups.</text>

  <!-- 2 Pipeline (amber) -->
  <g filter="url(#cardShadow2)">
    <rect x="269" y="126" width="222" height="192" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="269" y="126" width="4" height="192" rx="2" fill="#f0a85e"/>
  </g>
  <circle cx="309" cy="166" r="20" fill="#f0a85e" fill-opacity="0.18" stroke="#f0a85e" stroke-width="1.5"/>
  <use href="#a-chain" x="298" y="155" width="22" height="22" color="#f0a85e"/>
  <text x="341" y="162" font-size="16" font-weight="700" fill="#f3f6fa">Pipeline</text>
  <text x="289" y="208" font-size="11.5" fill="#c3d2de">Nightly pipeline: gathers</text>
  <text x="289" y="224" font-size="11.5" fill="#c3d2de">saved reading, synthesizes</text>
  <text x="289" y="240" font-size="11.5" fill="#c3d2de">it, and files it away.</text>

  <!-- 3 Guardian (green) -->
  <g filter="url(#cardShadow2)">
    <rect x="509" y="126" width="222" height="192" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="509" y="126" width="4" height="192" rx="2" fill="#6fd88a"/>
  </g>
  <circle cx="549" cy="166" r="20" fill="#6fd88a" fill-opacity="0.18" stroke="#6fd88a" stroke-width="1.5"/>
  <use href="#a-shield" x="538" y="155" width="22" height="22" color="#6fd88a"/>
  <text x="581" y="162" font-size="16" font-weight="700" fill="#f3f6fa">Guardian</text>
  <text x="529" y="208" font-size="11.5" fill="#c3d2de">Daily health checks and</text>
  <text x="529" y="224" font-size="11.5" fill="#c3d2de">policy enforcement across</text>
  <text x="529" y="240" font-size="11.5" fill="#c3d2de">the whole fleet.</text>

  <!-- 4 Invest (violet) -->
  <g filter="url(#cardShadow2)">
    <rect x="749" y="126" width="222" height="192" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="749" y="126" width="4" height="192" rx="2" fill="#b89bf5"/>
  </g>
  <circle cx="789" cy="166" r="20" fill="#b89bf5" fill-opacity="0.18" stroke="#b89bf5" stroke-width="1.5"/>
  <use href="#a-trend" x="778" y="155" width="22" height="22" color="#b89bf5"/>
  <text x="821" y="162" font-size="16" font-weight="700" fill="#f3f6fa">Invest</text>
  <text x="769" y="208" font-size="11.5" fill="#c3d2de">Investment research:</text>
  <text x="769" y="224" font-size="11.5" fill="#c3d2de">parallel signal-gathering</text>
  <text x="769" y="240" font-size="11.5" fill="#c3d2de">synthesized into a brief.</text>

  <!-- 5 Coverletter (coral) -->
  <g filter="url(#cardShadow2)">
    <rect x="29" y="338" width="222" height="192" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="29" y="338" width="4" height="192" rx="2" fill="#f4886a"/>
  </g>
  <circle cx="69" cy="378" r="20" fill="#f4886a" fill-opacity="0.18" stroke="#f4886a" stroke-width="1.5"/>
  <use href="#a-docpen" x="58" y="367" width="22" height="22" color="#f4886a"/>
  <text x="101" y="374" font-size="16" font-weight="700" fill="#f3f6fa">Coverletter</text>
  <text x="49" y="420" font-size="11.5" fill="#c3d2de">Drafts tailored job-</text>
  <text x="49" y="436" font-size="11.5" fill="#c3d2de">application material</text>
  <text x="49" y="452" font-size="11.5" fill="#c3d2de">on request.</text>

  <!-- 6 Intel (pink) -->
  <g filter="url(#cardShadow2)">
    <rect x="269" y="338" width="222" height="192" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="269" y="338" width="4" height="192" rx="2" fill="#f06fa0"/>
  </g>
  <circle cx="309" cy="378" r="20" fill="#f06fa0" fill-opacity="0.18" stroke="#f06fa0" stroke-width="1.5"/>
  <use href="#a-radar" x="298" y="367" width="22" height="22" color="#f06fa0"/>
  <text x="341" y="374" font-size="16" font-weight="700" fill="#f3f6fa">Intel</text>
  <text x="289" y="420" font-size="11.5" fill="#c3d2de">Intelligence digest:</text>
  <text x="289" y="436" font-size="11.5" fill="#c3d2de">parallel research synthesized</text>
  <text x="289" y="452" font-size="11.5" fill="#c3d2de">into a daily brief.</text>

  <!-- 7 Calls (gold) -->
  <g filter="url(#cardShadow2)">
    <rect x="509" y="338" width="222" height="192" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="509" y="338" width="4" height="192" rx="2" fill="#f0d25e"/>
  </g>
  <circle cx="549" cy="378" r="20" fill="#f0d25e" fill-opacity="0.18" stroke="#f0d25e" stroke-width="1.5"/>
  <use href="#a-phone" x="538" y="367" width="22" height="22" color="#f0d25e"/>
  <text x="581" y="374" font-size="16" font-weight="700" fill="#f3f6fa">Calls</text>
  <text x="529" y="420" font-size="11.5" fill="#c3d2de">Voice-call interface:</text>
  <text x="529" y="436" font-size="11.5" fill="#c3d2de">phone-based interaction,</text>
  <text x="529" y="452" font-size="11.5" fill="#c3d2de">no app needed.</text>

  <!-- 8 Podcast (blue) -->
  <g filter="url(#cardShadow2)">
    <rect x="749" y="338" width="222" height="192" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="749" y="338" width="4" height="192" rx="2" fill="#6fa8e0"/>
  </g>
  <circle cx="789" cy="378" r="20" fill="#6fa8e0" fill-opacity="0.18" stroke="#6fa8e0" stroke-width="1.5"/>
  <use href="#a-mic" x="778" y="367" width="22" height="22" color="#6fa8e0"/>
  <text x="821" y="374" font-size="16" font-weight="700" fill="#f3f6fa">Podcast</text>
  <text x="769" y="420" font-size="11.5" fill="#c3d2de">Podcast-transcript</text>
  <text x="769" y="436" font-size="11.5" fill="#c3d2de">digestion into a</text>
  <text x="769" y="452" font-size="11.5" fill="#c3d2de">daily summary.</text>

</svg>
