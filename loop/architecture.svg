<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <linearGradient id="lbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f18"/>
      <stop offset="48%" stop-color="#102c46"/>
      <stop offset="100%" stop-color="#0a2a28"/>
    </linearGradient>
    <pattern id="ldots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <filter id="lshadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="larrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#7fa8c9"/>
    </marker>

    <symbol id="l-plane" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 3 10 14"/><path d="M21 3 14 21l-3-7-7-3 17-8z"/>
    </g></symbol>
    <symbol id="l-phone" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 3h3l2 5-2.5 1.6a11.5 11.5 0 0 0 5.4 5.4L15.4 12.5l5 2v3a2 2 0 0 1-2 2A14.5 14.5 0 0 1 4 5a2 2 0 0 1 2-2z"/>
    </g></symbol>
    <symbol id="l-node" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="6" rx="1.6"/><rect x="3" y="14" width="18" height="6" rx="1.6"/>
      <circle cx="7" cy="7" r="0.9" fill="currentColor" stroke="none"/><circle cx="7" cy="17" r="0.9" fill="currentColor" stroke="none"/>
    </g></symbol>
    <symbol id="l-db" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="5.5" rx="8" ry="3"/><path d="M4 5.5v13c0 1.7 3.6 3 8 3s8-1.3 8-3v-13"/><path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/>
    </g></symbol>
    <symbol id="l-lock" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="11" width="14" height="9.5" rx="2"/><path d="M8 11V7.5a4 4 0 0 1 8 0V11"/>
    </g></symbol>
  </defs>

  <rect width="1000" height="600" rx="22" fill="url(#lbg)"/>
  <rect width="1000" height="600" rx="22" fill="url(#ldots)"/>

  <text x="500" y="36" text-anchor="middle" font-size="11" letter-spacing="3" font-weight="700" fill="#6fd8c7">CIVIC PARTICIPATION GATEWAY</text>
  <text x="500" y="68" text-anchor="middle" font-size="24" font-weight="600" fill="#f3f6fa">LOOP: System architecture</text>
  <text x="500" y="90" text-anchor="middle" font-size="12" fill="#9fb3c8">Two channels, one shared vote database, one Hetzner VPS</text>

  <!-- Row 1: Interfaces -->
  <g filter="url(#lshadow)">
    <rect x="185" y="120" width="300" height="86" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="185" y="120" width="4" height="86" rx="2" fill="#5ec8e0"/>
  </g>
  <circle cx="219" cy="163" r="18" fill="#5ec8e0" fill-opacity="0.18" stroke="#5ec8e0" stroke-width="1.4"/>
  <use href="#l-plane" x="208" y="152" width="22" height="22" color="#5ec8e0"/>
  <text x="249" y="156" font-size="15" font-weight="600" fill="#f3f6fa">Telegram</text>
  <text x="249" y="176" font-size="10.8" fill="#9fb3c8">Inline keyboards · free text</text>

  <g filter="url(#lshadow)">
    <rect x="515" y="120" width="300" height="86" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="515" y="120" width="4" height="86" rx="2" fill="#f0d25e"/>
  </g>
  <circle cx="549" cy="163" r="18" fill="#f0d25e" fill-opacity="0.18" stroke="#f0d25e" stroke-width="1.4"/>
  <use href="#l-phone" x="538" y="152" width="22" height="22" color="#f0d25e"/>
  <text x="579" y="156" font-size="15" font-weight="600" fill="#f3f6fa">Voice call</text>
  <text x="579" y="176" font-size="10.8" fill="#9fb3c8">DTMF keypad, no app</text>

  <!-- connectors with edge labels -->
  <line x1="335" y1="206" x2="335" y2="244" stroke="#7fa8c9" stroke-width="1.8" marker-end="url(#larrow)"/>
  <text x="345" y="228" font-size="9.5" fill="#7fa8c9">Caddy · HTTPS</text>
  <line x1="665" y1="206" x2="665" y2="244" stroke="#7fa8c9" stroke-width="1.8" marker-end="url(#larrow)"/>
  <text x="675" y="228" font-size="9.5" fill="#7fa8c9">Telnyx · PSTN</text>

  <!-- Row 2: Bot containers -->
  <g filter="url(#lshadow)">
    <rect x="185" y="254" width="300" height="86" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="185" y="254" width="4" height="86" rx="2" fill="#5ec8e0"/>
  </g>
  <circle cx="219" cy="297" r="18" fill="#5ec8e0" fill-opacity="0.18" stroke="#5ec8e0" stroke-width="1.4"/>
  <use href="#l-node" x="208" y="286" width="22" height="22" color="#5ec8e0"/>
  <text x="249" y="291" font-size="14" font-weight="600" fill="#f3f6fa">Telegram bot</text>
  <text x="249" y="309" font-size="10" fill="#9fb3c8">python-telegram-bot,</text>
  <text x="249" y="322" font-size="10" fill="#9fb3c8">AI-powered free text</text>

  <g filter="url(#lshadow)">
    <rect x="515" y="254" width="300" height="86" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="515" y="254" width="4" height="86" rx="2" fill="#f0d25e"/>
  </g>
  <circle cx="549" cy="297" r="18" fill="#f0d25e" fill-opacity="0.18" stroke="#f0d25e" stroke-width="1.4"/>
  <use href="#l-node" x="538" y="286" width="22" height="22" color="#f0d25e"/>
  <text x="579" y="291" font-size="14" font-weight="600" fill="#f3f6fa">Voice bot</text>
  <text x="579" y="309" font-size="10" fill="#9fb3c8">Flask + TeXML,</text>
  <text x="579" y="322" font-size="10" fill="#9fb3c8">DTMF menu, TTS</text>

  <!-- shared layer -->
  <line x1="335" y1="340" x2="335" y2="362" stroke="#5e7d96" stroke-width="1.4"/>
  <line x1="665" y1="340" x2="665" y2="362" stroke="#5e7d96" stroke-width="1.4"/>
  <g filter="url(#lshadow)">
    <rect x="185" y="368" width="630" height="60" rx="12" fill="#6fd88a" fill-opacity="0.08" stroke="#6fd88a" stroke-width="1.2"/>
  </g>
  <circle cx="223" cy="398" r="16" fill="#6fd88a" fill-opacity="0.18" stroke="#6fd88a" stroke-width="1.4"/>
  <use href="#l-db" x="212" y="387" width="22" height="22" color="#6fd88a"/>
  <text x="253" y="393" font-size="13" font-weight="600" fill="#f3f6fa">Shared layer</text>
  <text x="253" y="410" font-size="10.5" fill="#9fb3c8">SQLite vote database, one Docker volume shared by both bots</text>

  <!-- connector to secrets -->
  <line x1="500" y1="428" x2="500" y2="466" stroke="#7fa8c9" stroke-width="1.8" marker-end="url(#larrow)"/>

  <!-- secrets -->
  <g filter="url(#lshadow)">
    <rect x="350" y="474" width="300" height="70" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.14"/>
  </g>
  <circle cx="384" cy="509" r="16" fill="#b89bf5" fill-opacity="0.18" stroke="#b89bf5" stroke-width="1.4"/>
  <use href="#l-lock" x="373" y="498" width="22" height="22" color="#b89bf5"/>
  <text x="414" y="504" font-size="13.5" font-weight="600" fill="#f3f6fa">Infisical</text>
  <text x="414" y="521" font-size="10" fill="#9fb3c8">Secrets injected at startup, never hardcoded</text>

  <!-- badges -->
  <g font-size="10.5" letter-spacing="0.5" font-weight="600" text-anchor="middle">
    <rect x="310" y="562" width="170" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.15"/>
    <text x="395" y="581" fill="#dfe8f0">OPEN-SOURCE STACK</text>

    <rect x="500" y="562" width="190" height="30" rx="15" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.15"/>
    <text x="595" y="581" fill="#dfe8f0">HETZNER VPS · DOCKER</text>
  </g>

</svg>
