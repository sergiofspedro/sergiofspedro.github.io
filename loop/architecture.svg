<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="700" fill="#f8f9fb" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="19" font-weight="bold" fill="#1a2340">LOOP: System architecture</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#666">EU Commission Civic Tech Hackathon · Brussels · June 2026</text>

  <!-- ── USERS column ── -->
  <rect x="40" y="90" width="130" height="100" rx="10" fill="#e8f0fe" stroke="#4a7aec" stroke-width="1.5"/>
  <text x="105" y="118" text-anchor="middle" font-size="24">📱</text>
  <text x="105" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2340">Citizen</text>
  <text x="105" y="160" text-anchor="middle" font-size="10.5" fill="#555">Telegram app</text>
  <text x="105" y="175" text-anchor="middle" font-size="10.5" fill="#555">on smartphone</text>

  <rect x="40" y="210" width="130" height="100" rx="10" fill="#e8f0fe" stroke="#4a7aec" stroke-width="1.5"/>
  <text x="105" y="238" text-anchor="middle" font-size="24">☎️</text>
  <text x="105" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2340">Citizen</text>
  <text x="105" y="280" text-anchor="middle" font-size="10.5" fill="#555">Landline or</text>
  <text x="105" y="295" text-anchor="middle" font-size="10.5" fill="#555">any phone</text>

  <line x1="170" y1="140" x2="225" y2="140" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="197" y="132" text-anchor="middle" font-size="9.5" fill="#999">HTTPS</text>

  <line x1="170" y1="260" x2="225" y2="260" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="197" y="252" text-anchor="middle" font-size="9.5" fill="#999">PSTN</text>

  <!-- ── EDGE column ── -->
  <rect x="228" y="90" width="140" height="100" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="298" y="118" text-anchor="middle" font-size="22">🔒</text>
  <text x="298" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2340">Caddy</text>
  <text x="298" y="160" text-anchor="middle" font-size="10.5" fill="#555">HTTPS reverse</text>
  <text x="298" y="175" text-anchor="middle" font-size="10.5" fill="#555">proxy + TLS cert</text>

  <rect x="228" y="210" width="140" height="100" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="298" y="238" text-anchor="middle" font-size="22">📡</text>
  <text x="298" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2340">Telnyx</text>
  <text x="298" y="280" text-anchor="middle" font-size="10.5" fill="#555">Phone number</text>
  <text x="298" y="295" text-anchor="middle" font-size="10.5" fill="#555">provider (PSTN)</text>

  <line x1="368" y1="140" x2="412" y2="140" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="368" y1="260" x2="412" y2="260" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── DOCKER containers ── -->
  <rect x="408" y="70" width="190" height="340" rx="12" fill="#f0fdf4" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="503" y="90" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">🐳 Docker containers</text>

  <rect x="420" y="100" width="166" height="105" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="503" y="123" text-anchor="middle" font-size="22">🤖</text>
  <text x="503" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2340">Telegram bot</text>
  <text x="503" y="163" text-anchor="middle" font-size="10.5" fill="#555">python-telegram-bot</text>
  <text x="503" y="178" text-anchor="middle" font-size="10.5" fill="#555">Inline keyboards · voting</text>
  <text x="503" y="193" text-anchor="middle" font-size="10.5" fill="#555">AI-powered free text</text>

  <rect x="420" y="215" width="166" height="105" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="503" y="238" text-anchor="middle" font-size="22">🎙️</text>
  <text x="503" y="261" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2340">Voice bot</text>
  <text x="503" y="278" text-anchor="middle" font-size="10.5" fill="#555">Flask + TeXML</text>
  <text x="503" y="293" text-anchor="middle" font-size="10.5" fill="#555">DTMF menu · TTS</text>
  <text x="503" y="308" text-anchor="middle" font-size="10.5" fill="#555">speech-to-text opinions</text>

  <rect x="420" y="330" width="166" height="65" rx="8" fill="#e8f8f0" stroke="#27ae60" stroke-width="1.2"/>
  <text x="503" y="350" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#1a2340">Shared layer</text>
  <text x="503" y="367" text-anchor="middle" font-size="10.5" fill="#555">📄 Consultation data · 🗳️ SQLite votes</text>
  <text x="503" y="382" text-anchor="middle" font-size="10.5" fill="#555">(Docker volume, shared)</text>

  <!-- ── EXTERNAL SERVICES column ── -->
  <rect x="640" y="100" width="160" height="105" rx="10" fill="#fdf2fb" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="720" y="123" text-anchor="middle" font-size="22">🧠</text>
  <text x="720" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2340">OpenRouter</text>
  <text x="720" y="163" text-anchor="middle" font-size="10.5" fill="#555">DeepSeek V4 Flash</text>
  <text x="720" y="178" text-anchor="middle" font-size="10.5" fill="#555">Empathetic replies</text>
  <text x="720" y="193" text-anchor="middle" font-size="10.5" fill="#555">to citizen opinions</text>

  <line x1="586" y1="152" x2="638" y2="152" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowPurple)"/>
  <text x="612" y="143" text-anchor="middle" font-size="9.5" fill="#8e44ad">API</text>

  <rect x="640" y="215" width="160" height="105" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="720" y="238" text-anchor="middle" font-size="22">🔐</text>
  <text x="720" y="261" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a2340">Infisical</text>
  <text x="720" y="278" text-anchor="middle" font-size="10.5" fill="#555">Secrets manager</text>
  <text x="720" y="293" text-anchor="middle" font-size="10.5" fill="#555">API keys stored here</text>

  <line x1="640" y1="267" x2="588" y2="267" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowOrange)"/>
  <text x="613" y="258" text-anchor="middle" font-size="9.5" fill="#f39c12">inject</text>

  <!-- Hetzner VPS dashed border -->
  <rect x="395" y="55" width="420" height="370" rx="14" fill="none" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="605" y="442" text-anchor="middle" font-size="10.5" fill="#7f8c8d">Hetzner VPS: Ubuntu 22.04 · 4 GB RAM</text>

  <!-- ── HOW IT WORKS panel ── -->
  <rect x="40" y="470" width="820" height="210" rx="10" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="62" y="500" font-size="13" font-weight="bold" fill="#1a2340">How it works</text>

  <circle cx="62" cy="528" r="10" fill="#4a7aec" opacity="0.2"/>
  <text x="62" y="532" text-anchor="middle" font-size="10" fill="#4a7aec" font-weight="bold">1</text>
  <text x="82" y="532" font-size="11" fill="#333">Citizen opens Telegram or dials a phone number</text>

  <circle cx="62" cy="560" r="10" fill="#4a7aec" opacity="0.2"/>
  <text x="62" y="564" text-anchor="middle" font-size="10" fill="#4a7aec" font-weight="bold">2</text>
  <text x="82" y="558" font-size="11" fill="#333">Caddy (for Telegram) or Telnyx (for calls)</text>
  <text x="82" y="572" font-size="11" fill="#333">routes the request to the right bot container</text>

  <circle cx="62" cy="604" r="10" fill="#4a7aec" opacity="0.2"/>
  <text x="62" y="608" text-anchor="middle" font-size="10" fill="#4a7aec" font-weight="bold">3</text>
  <text x="82" y="598" font-size="11" fill="#333">Both bots share the same SQLite database: votes</text>
  <text x="82" y="612" font-size="11" fill="#333">cast on Telegram are visible from the voice menu</text>
  <text x="82" y="626" font-size="11" fill="#333">and vice-versa</text>

  <circle cx="450" cy="528" r="10" fill="#4a7aec" opacity="0.2"/>
  <text x="450" y="532" text-anchor="middle" font-size="10" fill="#4a7aec" font-weight="bold">4</text>
  <text x="470" y="522" font-size="11" fill="#333">When a citizen types a free-text opinion, the</text>
  <text x="470" y="536" font-size="11" fill="#333">Telegram bot sends it to DeepSeek V4 Flash</text>
  <text x="470" y="550" font-size="11" fill="#333">(via OpenRouter) for an empathetic reply</text>

  <circle cx="450" cy="582" r="10" fill="#4a7aec" opacity="0.2"/>
  <text x="450" y="586" text-anchor="middle" font-size="10" fill="#4a7aec" font-weight="bold">5</text>
  <text x="470" y="576" font-size="11" fill="#333">All API keys are stored in Infisical (secrets</text>
  <text x="470" y="590" font-size="11" fill="#333">manager), never hardcoded, injected into the</text>
  <text x="470" y="604" font-size="11" fill="#333">containers at startup</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8e44ad"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f39c12"/>
    </marker>
  </defs>
</svg>
